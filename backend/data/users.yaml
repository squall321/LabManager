# LabManager HR System - 사용자 계정 설정
# 이 파일에 이름과 이메일을 추가하면 시스템 시작 시 자동으로 계정이 생성됩니다.
# 최초 로그인 시 사용자가 직접 비밀번호를 설정합니다.
#
# 필드 설명:
#   name:           사용자 이름 (한글 가능)
#   email:          로그인에 사용할 이메일 주소 (고유해야 함)
#   is_admin:       계정/시스템 관리자 여부 (true/false, 기본 false)
#   is_part_leader: WorkCraft 파트장 여부 — 익명 집계만 조회 (admin과 독립, 기본 false)
#   department:     소속 부서 (선택, 집계는 현재 전체 단위)

